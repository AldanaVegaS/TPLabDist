<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a FAIDibujillo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pantalla-bienvenida">
    <div id="inicio">
        <h1>¡Bienvenido a FAIDibujillo!</h1>
        <p>Ingresá tu nombre de jugador para comenzar a jugar.</p>
        <form id="form-inicio">
            <input id="input-nombre" type="text" maxlength="20" autocomplete="off"
                   placeholder="Tu nombre de jugador" required />
            <button type="submit">Jugar</button>
        </form>
    </div>
    <script src="inicio.js"></script>
</body>
</html>
