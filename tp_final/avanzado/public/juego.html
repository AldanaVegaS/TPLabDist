<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAIDibujillo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">
</head>
<body>
    <div class="columnas">
        <div id="usuarios">
            <h1 class="arcoiris">
                <span>F</span><span>A</span><span>I</span><span>D</span><span>i</span><span>b</span><span>u</span><span>j</span><span>i</span><span>l</span><span>l</span><span>o</span>
            </h1>
            <div id="lista-jugadores"></div>
        </div>
        <div id="dibujo-canvas">
            <div id="barra-juego">
                <div id="ronda">
                    <div class="titulo-ronda">Ronda</div>
                    <div id="numero-ronda">1/3</div>
                </div>
                <div id="reloj">
                    <div id="tiempo">60</div>
                    <div id="segundos">
                        <span>
                            Segundos
                        </span>
                    </div>
                </div>
                <div id="palabra">
                    <div class="titulo-palabra">Palabra</div>
                    <div id="texto-palabra">
                        <span>Palabra</span>
                    </div>
                </div>
            </div>
            <canvas id="lienzo" width="500" height="500" style="border:1px solid #000000;"></canvas>

            <div class="contenedor-herrramientas">
                <button class="tool-btn" id="eraser" onclick="erase()">
                    <i class="fas fa-eraser"></i>
                </button>
                <button class="tool-btn" id="pencil" onclick="pencil()"> 
                    <i class="fas fa-pencil-alt"></i>  
                </button>

                <div class="divider"></div>

                <div class="contenedor-grosor">
                    <i class="ti ti-line-dashed" style="font-size:16px; color:var(--color-text-secondary)" aria-hidden="true"></i>
                    <input id="grosor" type="range" min="1" max="15" value="3"/>
                    <span class="label-grosor" id="label-grosor"></span>
                </div>

                <div class="divider"></div>
            
                <div class="contenedor-circulos">
                    <button class="circulo circulo-negro" onclick="changeColor('#000000')"></button>
                    <button class="circulo circulo-rojo" onclick="changeColor('#FF0000')"></button>
                    <button class="circulo circulo-azul" onclick="changeColor('#0B52D6')"></button>
                    <button class="circulo circulo-verde" onclick="changeColor('#21c640')"></button>
                    <button class="circulo circulo-amarillo" onclick="changeColor('#FFD133')"></button>
                    <button class="circulo circulo-violeta" onclick="changeColor('#9d23de')"></button>
                    <button class="circulo circulo-rosa" onclick="changeColor('#e773e0')"></button>
                    <button class="circulo circulo-marron" onclick="changeColor('#89602e')"></button>
                    <button class="circulo circulo-naranja" onclick="changeColor('#FD801A')"></button>
                </div>
                
            </div>
        </div>
        <div id="chat-jugadores">
            <div id="chat-header">
                <i class="fas fa-comments"></i>
                <span>Chat</span>
            </div>
            <div id="mjs"></div>
            <form id="form-chat">
                <input id="input-chat" autocomplete="off" placeholder="Escribe acá..."/>
                <button type="submit">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="chat.js"></script>
    <script src="client.js"></script>
    <script src="canva.js"></script>
</body>
</html>
